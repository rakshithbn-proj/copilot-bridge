name: Release

# Triggered when you push a version tag: git tag v5.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Publish to PyPI ───────────────────────────────────────────────
  publish-wheel:
    name: Publish Python Wheel to PyPI
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        working-directory: copilot-bridge-dist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: copilot-bridge-dist/dist/
          package-name: copilot-bridge
